name: ✨ Feature Request
description: 提议一个新功能或改进
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 为什么需要这个?现在是什么不便?
      placeholder: 当我想 ... 时,现在只能 ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的提议
      description: 一句话说清楚你想要什么
      placeholder: 在 ... 加 ...,这样可以 ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案(可选)
      description: 你考虑过的其它做法
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围(多选)
      multiple: true
      options:
        - 后端 / agent 内核
        - 后端 / conv 编排
        - 后端 / API
        - 前端 / 树
        - 前端 / 对话面板
        - 前端 / 编辑器
        - 工具(shell/sql/create_agent/call_agent)
        - 数据模型
        - 文档
    validations:
      required: false
